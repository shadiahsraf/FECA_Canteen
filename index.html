<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Canteen · First Evangelical Church, Assiut</title>
  <meta name="theme-color" content="#fbfaf6" />
  <link rel="icon" href="assets/emblem.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="login">
    <div class="login__card">
      <div class="login__emblem">
        <svg viewBox="0 0 240 210" xmlns="http://www.w3.org/2000/svg" fill="none"
             stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <text x="120" y="20" text-anchor="middle" font-family="'El Messiri',serif" font-size="16" stroke="none" fill="currentColor" letter-spacing="1">منذ ١٨٧٠</text>
          <path d="M40 78 L64 40 L88 78" /><path d="M46 78 L46 150 M82 78 L82 150" />
          <path d="M56 92 q8 -8 16 0 L72 108 L56 108 Z" fill="currentColor" stroke="none"/>
          <path d="M152 78 L176 40 L200 78" /><path d="M158 78 L158 150 M194 78 L194 150" />
          <path d="M168 92 q8 -8 16 0 L184 108 L168 108 Z" fill="currentColor" stroke="none"/>
          <path d="M96 150 L96 92 q24 -30 48 0 L144 150" /><path d="M110 62 q10 -12 20 0" />
          <path d="M120 62 L120 44 M112 51 L128 51" stroke-width="3.5"/>
          <path d="M120 108 L120 148 M104 122 L136 122" stroke-width="6"/>
          <path d="M28 158 q92 -22 92 8 q0 -30 92 -8" />
          <path d="M28 158 L28 170 q92 -20 92 6 q0 -26 92 -6 L212 158" />
          <path d="M40 164 q80 -16 80 6 M120 170 q0 -22 80 -6" stroke-width="2"/>
        </svg>
      </div>

      <h1 class="login__name" data-brand-ar>الكنيسة الإنجيلية الأولى في أسيوط</h1>
      <p class="login__name-en" data-brand-en>First Evangelical Church — Assiut</p>

      <form class="login__form" id="login-form" autocomplete="off" novalidate>
        <span class="eyebrow" style="display:block;margin-bottom:8px">Canteen access</span>
        <div class="login__field-wrap">
          <svg class="login__lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
          </svg>
          <input class="field" id="login-password" type="password" placeholder="Enter password" aria-label="Password" required />
        </div>
        <p class="field-error" id="login-error"></p>
        <button class="btn btn--gold btn--block login__submit" type="submit">Enter the canteen</button>
      </form>

      <p class="login__hint">Default password <code>seller</code> — change it in <code>js/config.js</code>.</p>
    </div>
  </main>

  <script src="js/env.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
